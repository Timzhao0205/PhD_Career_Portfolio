  <text x="320" y="270" class="t" text-anchor="middle">q1 / P(q1)</text><text x="408" y="365" class="t">q2 / P(q2)</text><text x="320" y="458" class="t" text-anchor="middle">q3 / P(q3)</text><text x="130" y="365" class="t">q4 / P(q4)</text>
  <path d="M320 285 L157 178" class="bond"/><path d="M395 360 L507 222" class="bond"/><path d="M320 435 L507 510" class="bond"/><path d="M245 360 L157 572" class="bond"/>
  <text x="145" y="130" class="s">q1 → shelf 8</text><text x="548" y="220" class="s">q2 → shelf 3</text><text x="405" y="645" class="s">q3 → shelf 19</text><text x="130" y="645" class="s">q4 → shelf 14</text>

  <rect x="65" y="680" width="510" height="150" rx="8" class="pass"/>
  <text x="85" y="710" class="h">Selected external connection</text>
  <text x="85" y="739" class="s">8/3/19/14 → same-numbered castellation → L1/L2/L3/L4 fanout tongue</text>
  <text x="85" y="761" class="s">→ qualified weld or exact-contact crimp pigtail → remote service disconnect.</text>
  <text x="85" y="783" class="s">No solder. No load through shelf, castellation, bond, lane, weld or crimp.</text>
  <text x="85" y="805" class="s">User routes 8↔4, 3↔9, 19↔13, 14↔18 are normalized but rejected.</text>
  <text x="85" y="824" class="s">They are not the production one-side connection.</text>

  <text x="620" y="120" class="h">B. Orientation and terminal rule</text>
  <rect x="620" y="140" width="730" height="118" rx="8" class="hold"/>
  <text x="642" y="170" class="h">HOLD — DO NOT BOND</text>
  <text x="642" y="198" class="t">Record P(q1), P(q2), P(q3), P(q4) from authoritative die evidence. No mirror.</text>
  <text x="642" y="223" class="t">Only then apply: p1→J1.1, p3→J1.2, p2→J1.6, p4→J1.7.</text>
  <text x="642" y="246" class="s">The 14/18 notation is closed: q4 lands on shelf 14; 14↔18 was an unordered user jumper drawn in the mirrored bottom view.</text>

  <text x="620" y="300" class="h">C. Final 12-conductor map</text>
  <rect x="620" y="320" width="730" height="430" class="table"/>
  <g class="axis">
