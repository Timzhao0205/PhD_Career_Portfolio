  <rect width="1400" height="900" fill="white"/>
  <text x="45" y="48" class="title">FINAL CONTROLLED MAP — CAVITY UP, CHAMFER LOWER RIGHT</text>
  <text x="45" y="76" class="t">All dimensions in mm. Physical q locations are fixed; p1–p4 identities remain P(q) until the signed microscope/GDS traveler.</text>

  <text x="65" y="120" class="h">A. LCC02046 physical map</text>
  <rect x="95" y="160" width="430" height="430" rx="8" fill="#fafafa" stroke="#26364d" stroke-width="3"/>
  <polygon points="485,590 525,550 525,590" fill="#26364d"/>
  <text x="390" y="615" class="t">Chamfer / Datum A: lower right</text>

  <!-- top 8..4 -->
  <g class="pad">
    <rect x="130" y="140" width="54" height="38"/><rect x="202" y="140" width="54" height="38"/><rect x="274" y="140" width="54" height="38"/><rect x="346" y="140" width="54" height="38"/><rect x="418" y="140" width="54" height="38"/>
    <rect x="507" y="195" width="38" height="54"/><rect x="507" y="267" width="38" height="54"/><rect x="507" y="339" width="38" height="54"/><rect x="507" y="411" width="38" height="54"/><rect x="507" y="483" width="38" height="54"/>
    <rect x="130" y="572" width="54" height="38"/><rect x="202" y="572" width="54" height="38"/><rect x="274" y="572" width="54" height="38"/><rect x="346" y="572" width="54" height="38"/><rect x="418" y="572" width="54" height="38"/>
