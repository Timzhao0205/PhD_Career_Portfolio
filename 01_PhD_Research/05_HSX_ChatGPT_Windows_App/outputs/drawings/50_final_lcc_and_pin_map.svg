    <text x="660" y="629">Z</text><text x="750" y="616">p1 p3</text><text x="750" y="642">p2 p4</text><text x="857" y="616">V9 V10</text><text x="857" y="642">V11 V12</text><text x="980" y="616">A5 A4</text><text x="980" y="642">A3 A2</text><text x="1105" y="616">ZA</text><text x="1105" y="642">ZB</text><text x="1257" y="629">1 2 6 7</text>
    <text x="660" y="718">Spare</text><text x="750" y="718">none</text><text x="857" y="706">V13–V19</text><text x="980" y="706">A14 A13 A18</text><text x="980" y="730">A17 A16 A15 A19</text><text x="1105" y="718">none</text><text x="1257" y="718">capped</text>
  </g>
  <rect x="620" y="775" width="730" height="65" rx="7" class="pass"/>
  <text x="642" y="802" class="t">Six pair screens terminate at CF flange/chassis only. No screen, ground or shared return uses V1–V19.</text>
  <text x="642" y="827" class="s">First-article V1–V19 mirror continuity is controlling because connector numbers are not printed.</text>
  <text x="45" y="875" class="s">Drawing 50_final_lcc_and_pin_map.svg — NOT A BOND/TRIM TRAVELER until all orange HOLD items close.</text>
