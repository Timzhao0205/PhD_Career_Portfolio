  <g class="t" text-anchor="middle">
    <text x="157" y="165">8</text><text x="229" y="165">7</text><text x="301" y="165">6</text><text x="373" y="165">5</text><text x="445" y="165">4</text>
    <text x="526" y="227">3</text><text x="526" y="299">2</text><text x="526" y="371">1</text><text x="526" y="443">20</text><text x="526" y="515">19</text>
    <text x="157" y="597">14</text><text x="229" y="597">15</text><text x="301" y="597">16</text><text x="373" y="597">17</text><text x="445" y="597">18</text>
