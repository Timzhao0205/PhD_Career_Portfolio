<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#12202b}.sub{font:15px Arial,sans-serif;fill:#344751}
      .label{font:700 14px Arial,sans-serif;fill:#12202b}.small{font:12px Arial,sans-serif;fill:#344751}
      .hot{fill:#fff4dd;stroke:#b56b00;stroke-width:2}.box{fill:#f6f9fa;stroke:#49616d;stroke-width:2}
      .board{fill:#e8f3ff;stroke:#3164a8;stroke-width:2}.star{fill:#e8f6ea;stroke:#367b48;stroke-width:2}
      .hold{fill:#fff2d2;stroke:#ad6a00;stroke-width:2}.earth{stroke:#222;stroke-width:4;fill:none}
      .gnd{stroke:#2f6f3e;stroke-width:5;fill:none}.pwr{stroke:#c44e31;stroke-width:5;fill:none}
      .float{stroke:#7b4aa3;stroke-width:4;fill:none}.shield{stroke:#5b6870;stroke-width:4;fill:none;stroke-dasharray:9 6}
      .barrier{stroke:#1c6aa4;stroke-width:4;stroke-dasharray:5 5}.boundary{stroke:#b56b00;stroke-width:4;stroke-dasharray:12 8}
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2f6f3e"/></marker>
  </defs>
  <rect width="1400" height="900" fill="#fff"/>
  <text x="35" y="42" class="title">Ground, shield, isolated power, and fault-containment architecture</text>
  <text x="35" y="68" class="sub">Cost baseline intentionally commons ambient board references at one panel because the grounded scope already does so; Hall terminals and bias loops remain floating and unique</text>

  <line x1="430" y1="100" x2="430" y2="740" class="boundary"/>
  <text x="145" y="110" class="label">250°C UHV</text><text x="470" y="110" class="label">AMBIENT</text>

  <!-- Hot sensor pairs and shields -->
  <rect x="45" y="155" width="260" height="480" class="hot" rx="12"/>
  <text x="175" y="185" text-anchor="middle" class="label">Three floating sensor cartridges</text>
  <text x="175" y="212" text-anchor="middle" class="small">X: XA/XB  Y: YA/YB  Z: ZA/ZB</text>
  <text x="175" y="238" text-anchor="middle" class="small">12 unique Hall conductors</text>
  <text x="175" y="265" text-anchor="middle" class="small">no die/chassis/guard ground terminal</text>
  <path d="M90 315 H270" class="float"/><text x="180" y="305" text-anchor="middle" class="small">six twisted signal pairs</text>
  <path d="M90 365 H270" class="shield"/><text x="180" y="391" text-anchor="middle" class="small">six screens float at cartridges</text>
  <text x="175" y="445" text-anchor="middle" class="small">bond guards are vented ceramic</text>
  <text x="175" y="467" text-anchor="middle" class="small">no closed conductive loop near die</text>
  <rect x="80" y="520" width="190" height="76" class="hold" rx="6"/>
  <text x="175" y="546" text-anchor="middle" class="small">p1/p3 and p2/p4 roles</text>
  <text x="175" y="565" text-anchor="middle" class="small">alternate with phase; screens</text>
  <text x="175" y="584" text-anchor="middle" class="small">never become bias returns</text>

  <!-- CF flange chassis -->
  <rect x="335" y="150" width="70" height="500" class="box" rx="8"/>
  <text x="370" y="180" text-anchor="middle" class="label">CF</text>
  <text x="370" y="199" text-anchor="middle" class="label">flange</text>
  <text x="370" y="245" text-anchor="middle" class="small">V1–V12</text>
  <text x="370" y="263" text-anchor="middle" class="small">signals</text>
  <text x="370" y="315" text-anchor="middle" class="small">screens</text>
  <text x="370" y="333" text-anchor="middle" class="small">bond here</text>
  <text x="370" y="385" text-anchor="middle" class="small">no GND</text>
  <text x="370" y="403" text-anchor="middle" class="small">signal pin</text>
  <text x="370" y="455" text-anchor="middle" class="small">V13–19</text>
  <text x="370" y="473" text-anchor="middle" class="small">spare/open</text>
  <path d="M270 315 H335" class="float"/><path d="M270 365 H370" class="shield"/>
  <path d="M370 650 V715" class="earth"/>
  <path d="M350 715 H390 M357 725 H383 M364 735 H376" class="earth"/>
  <text x="300" y="752" class="small">VESSEL / CHASSIS / FACILITY EARTH</text>

  <!-- 24V distribution -->
  <rect x="465" y="145" width="220" height="105" class="box" rx="8"/>
  <text x="575" y="175" text-anchor="middle" class="label">24-V source</text>
  <text x="575" y="198" text-anchor="middle" class="small">shared upstream only</text>
  <text x="575" y="220" text-anchor="middle" class="small">PWR_RET separate from AGND_STAR</text>
  <path d="M685 190 H730" class="pwr"/>

  <!-- Boards and barriers -->
  <g>
    <rect x="735" y="125" width="255" height="190" class="board" rx="9"/>
    <text x="862" y="153" text-anchor="middle" class="label">Board X domain</text>
    <text x="862" y="177" text-anchor="middle" class="small">fuse/current limit → RS6_X</text>
    <line x1="785" y1="195" x2="940" y2="195" class="barrier"/>
    <text x="862" y="217" text-anchor="middle" class="small">functional isolation barrier</text>
    <text x="862" y="240" text-anchor="middle" class="small">±15 V_X / GND1_X / analog X</text>
    <text x="862" y="264" text-anchor="middle" class="small">floating 100 µA X output/return</text>
    <text x="862" y="287" text-anchor="middle" class="small">unique sensor p1–p4 only</text>

    <rect x="735" y="350" width="255" height="190" class="board" rx="9"/>
    <text x="862" y="378" text-anchor="middle" class="label">Board Y domain</text>
    <text x="862" y="402" text-anchor="middle" class="small">fuse/current limit → RS6_Y</text>
    <line x1="785" y1="420" x2="940" y2="420" class="barrier"/>
    <text x="862" y="442" text-anchor="middle" class="small">±15 V_Y / GND1_Y / analog Y</text>
    <text x="862" y="466" text-anchor="middle" class="small">floating 100 µA Y output/return</text>
    <text x="862" y="489" text-anchor="middle" class="small">no current-source common</text>

    <rect x="735" y="575" width="255" height="190" class="board" rx="9"/>
    <text x="862" y="603" text-anchor="middle" class="label">Board Z domain</text>
    <text x="862" y="627" text-anchor="middle" class="small">fuse/current limit → RS6_Z</text>
    <line x1="785" y1="645" x2="940" y2="645" class="barrier"/>
    <text x="862" y="667" text-anchor="middle" class="small">±15 V_Z / GND1_Z / analog Z</text>
    <text x="862" y="691" text-anchor="middle" class="small">floating 100 µA Z output/return</text>
    <text x="862" y="714" text-anchor="middle" class="small">branch-disconnectable</text>
  </g>
  <path d="M730 190 V675" class="pwr"/>
  <path d="M730 190 H735 M730 415 H735 M730 640 H735" class="pwr"/>

  <!-- Sensor loops to boards -->
  <path d="M405 245 H700 V250 H735" class="float"/>
  <path d="M405 275 H680 V475 H735" class="float"/>
  <path d="M405 305 H660 V700 H735" class="float"/>
  <text x="525" y="295" class="small">12 signal pins only; no shared return</text>

  <!-- AGND star / interface -->
  <rect x="1060" y="260" width="285" height="300" class="star" rx="12"/>
  <text x="1202" y="292" text-anchor="middle" class="label">AGND_STAR / interface panel</text>
  <text x="1202" y="320" text-anchor="middle" class="small">Pico + 3 quad buffer branches</text>
  <text x="1202" y="343" text-anchor="middle" class="small">three branch bundles: controls + VMEAS + returns</text>
  <text x="1202" y="366" text-anchor="middle" class="small">overall shields bond here only</text>
  <text x="1202" y="402" text-anchor="middle" class="small">BNC panel → grounded 4-ch scope</text>
  <text x="1202" y="425" text-anchor="middle" class="small">CH1 X / CH2 Y / CH3 Z / CH4 sync</text>
  <text x="1202" y="461" text-anchor="middle" class="small">intentional GND1 common occurs here</text>
  <text x="1202" y="484" text-anchor="middle" class="small">not through feedthrough or current-source return</text>
  <rect x="1100" y="510" width="205" height="34" class="hold" rx="5"/>
  <text x="1202" y="532" text-anchor="middle" class="small">survey earth paths before adding link</text>

  <!-- Ground branches -->
  <path d="M990 260 H1060" class="gnd"/><path d="M990 475 H1030 V390 H1060" class="gnd"/><path d="M990 700 H1020 V520 H1060" class="gnd"/>
  <text x="1015" y="245" class="small">one documented branch bundle per board</text>

  <!-- Scope earth / single bond -->
  <rect x="1105" y="610" width="195" height="95" class="box" rx="8"/>
  <text x="1202" y="639" text-anchor="middle" class="label">Grounded scope / DAQ</text>
  <text x="1202" y="662" text-anchor="middle" class="small">BNC shells common + PE</text>
  <text x="1202" y="685" text-anchor="middle" class="small">defines normal AGND↔earth bond</text>
  <path d="M1202 560 V610" class="gnd"/>
  <path d="M1202 705 V765 H370 V735" class="earth"/>
  <text x="760" y="792" text-anchor="middle" class="small">ONE VERIFIED AGND_STAR ↔ chassis/earth path; do not add a second vessel/supply/scope bond</text>

  <!-- fault containment note -->
  <rect x="45" y="815" width="1300" height="62" class="hold" rx="8"/>
  <text x="65" y="842" class="label">FAULT BOUNDARIES:</text>
  <text x="230" y="842" class="small">per-board buffer package, 24-V protection, floating current-source limit and disconnect; 12 sensor nets never parallel.</text>
  <text x="65" y="864" class="small">If AGND commoning is unacceptable, upgrade both control and acquisition to galvanically isolated/differential paths—isolating only one path does not remove the loop.</text>
</svg>
